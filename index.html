<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Brain Game</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1C2B4A,#0f1a2e);
  color:#fff;
  text-align:center;
}

.container {
  padding:20px;
}

h1 {
  color:#FFB800;
}

.card {
  background:#24385c;
  padding:25px;
  border-radius:15px;
  margin-top:20px;
  animation: fade 0.4s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

button {
  padding:12px 20px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  background:#FFB800;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover {
  background:#ffc933;
}

button:active {
  transform:scale(0.95);
}

input {
  padding:10px;
  border-radius:6px;
  border:none;
  margin-top:10px;
}

.stats {
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:15px;
}

.stat {
  background:#2f4b7c;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
  <h1>⚡ Infinite Brain Game</h1>

  <div class="stats">
    <div class="stat">Score: <span id="score">0</span></div>
    <div class="stat">Streak: <span id="streak">0</span></div>
    <div class="stat">Level: <span id="level">1</span></div>
  </div>

  <div class="card">
    <h2 id="question">Loading...</h2>

    <input id="answerInput" placeholder="Your answer..." />
    <br>
    <button onclick="checkAnswer()">Submit</button>

    <p id="result"></p>
  </div>

  <button onclick="nextPuzzle()">Next Puzzle</button>
</div>

<!-- sounds -->
<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
let score = Number(localStorage.getItem("score")) || 0;
let streak = Number(localStorage.getItem("streak")) || 0;
let level = Number(localStorage.getItem("level")) || 1;

document.getElementById("score").innerText = score;
document.getElementById("streak").innerText = streak;
document.getElementById("level").innerText = level;

let currentAnswer = "";

function random(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function generatePuzzle(){
  const types = ["math","pattern","logic","square","double"];
  let type = types[random(0,types.length-1)];

  // difficulty increase
  let difficulty = Math.min(level,50);

  if(type==="math"){
    let a = random(1,10*difficulty);
    let b = random(1,10*difficulty);
    currentAnswer = (a+b).toString();
    return `${a} + ${b} = ?`;
  }

  if(type==="pattern"){
    let n = random(2,5);
    currentAnswer = (n*4).toString();
    return `${n}, ${n*2}, ${n*3}, ?`;
  }

  if(type==="logic"){
    currentAnswer = "10";
    return "A=1, B=2, C=3 → A+B+C+D = ?";
  }

  if(type==="square"){
    let n = random(2,10);
    currentAnswer = (n*n).toString();
    return `${n}² = ?`;
  }

  if(type==="double"){
    let n = random(2,20);
    currentAnswer = (n*2).toString();
    return `${n} × 2 = ?`;
  }
}

function nextPuzzle(){
  document.getElementById("result").innerText="";
  document.getElementById("answerInput").value="";
  document.getElementById("question").innerText = generatePuzzle();
}

function checkAnswer(){
  let user = document.getElementById("answerInput").value.trim();

  if(user === currentAnswer){
    score++;
    streak++;
    level++;

    document.getElementById("result").innerText="✅ Correct!";
    document.getElementById("correctSound").play();
  } else {
    streak = 0;
    document.getElementById("result").innerText="❌ Wrong! Answer: "+currentAnswer;
    document.getElementById("wrongSound").play();
  }

  localStorage.setItem("score",score);
  localStorage.setItem("streak",streak);
  localStorage.setItem("level",level);

  document.getElementById("score").innerText = score;
  document.getElementById("streak").innerText = streak;
  document.getElementById("level").innerText = level;
}

nextPuzzle();
</script>

</body>
</html>
